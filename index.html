<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <script src="https://cookiechimp.com/widget/jGRt5Z6.js"></script> !-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage</title>
    <link rel="stylesheet" href="style.css">  
    <script defer type="text/javascript" src="config.js"></script>
    <script defer type="text/javascript" src="klaro.js"></script>
</head>

<body>

    <header>
        <h1>Welcome to My Simple Webpage</h1>
    </header>

    <main>
        <div class="container">

        <div id="g_id_onload"
             data-client_id="540754736098-ahrealgn91kaajougd6nb38u8bphnlg8.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="onSignIn"
             data-auto_prompt="false">
        </div>
        
        <!-- data-login_uri="http://localhost:3000/callback" -->

        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left">
        </div>

        </div>
    </main>

    <footer>
        &copy; 2023 My Website
    </footer>

    <script src="script.js" defer></script> 
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>

    function onSignIn(googleUser) {  // Note: googleUser is *not* the credential response here.
      // Get the auth response (which contains the ID token)
      const authResponse = googleUser.getAuthResponse();
      const idToken = authResponse.id_token;

      fetch('https://your-website.com/your-login-endpoint', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ token: idToken })
      })
      .then(response => response.json())
      .then(data => {
        console.log('Success:', data);
        if (data.success) {
          window.location.href = "/your-protected-page";
        } else {
          console.error("Login Error:", data.message);
        }
      })
      .catch((error) => {
        console.error('Error:', error);
      });
    }

    // No need for google.accounts.id.initialize or google.accounts.id.renderButton here
    // as the data-callback and data-client_id in the g_id_onload div handles it.
    </script>

</body>

</html>

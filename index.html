<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <script src="https://cookiechimp.com/widget/jGRt5Z6.js"></script> !-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage</title>
    <link rel="stylesheet" href="style.css">  
    <script defer type="text/javascript" src="config.js"></script>
    <script defer type="text/javascript" src="klaro.js"></script>
    <script src="auth.js" defer></script> 
</head>

<body>

    <div class="container">

        <h1>Google Sign-In with Profile</h1>

        <div  id="g_id_onload"
              data-client_id="540754736098-ahrealgn91kaajougd6nb38u8bphnlg8.apps.googleusercontent.com"
              data-callback="onSignIn">  </div>
        
        <!-- data-login_uri="http://localhost:3000/callback" -->

        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="Sign in with Google"
             data-size="large"
             data-logo_alignment="left">
        </div>

    </div>

    <script src="script.js" defer></script> 
    <script src="https://accounts.google.com/gsi/client" async defer></script>

</body>

</html>

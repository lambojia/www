<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <script src="https://cookiechimp.com/widget/jGRt5Z6.js"></script> !-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage</title>
    <link rel="stylesheet" href="style.css">  
    <script defer type="text/javascript" src="config.js"></script>
    <script defer type="text/javascript" src="klaro.js"></script>
</head>

<body>

    <header>
        <h1>Welcome to My Simple Webpage</h1>
    </header>

    <main>
        <div class="container">

        <meta name="google-signin-client_id" content="540754736098-ahrealgn91kaajougd6nb38u8bphnlg8.apps.googleusercontent.com">

        <div id="signInButtonContainer">
        </div>
        
        <!-- data-login_uri="http://localhost:3000/callback" -->

        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left">
        </div>

        </div>
    </main>

    <footer>
        &copy; 2023 My Website
    </footer>

    <script src="script.js" defer></script> 
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>

    window.addEventListener('DOMContentLoaded', () => {

        const idToken = localStorage.getItem('google_token') || sessionStorage.getItem('google_token'); // Check both

        if (token) {
          verifyToken(idToken);
        } else {
          // No token found, user is not logged in.
          console.log("No token found on page load.");
          // ... (Display login button, etc.)
        }
    });

    function verifyToken(idToken) {

        fetch('http://localhost:3000/callback', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ token: idToken })
        })
        .then(response => response.json())
        .then(data => {
          console.log('Success:', data);
          if (data.success) {
             localStorage.setItem('google_token', response.credential); // Or data.token if your server returns it
             console.log(data);
            //window.location.href = "/your-protected-page";
          } else {
            localStorage.removeItem('google_token');
            sessionStorage.removeItem('google_token');
            console.error("Login Error:", data.message);
          }
        })
        .catch((error) => {
          localStorage.removeItem('google_token');
          sessionStorage.removeItem('google_token');
          console.error('Error:', error);
        });
    }

    function onSignIn(response) { // Correct parameter: response, not googleUser

      const idToken = response.credential; // Access credential directly

      if (idToken) {  // Check if token exists
        verifyToken(idToken);
      } else {
        console.error("No ID token received.");
      }
    }

    async function loadGoogleSignIn() {

      try {
        await google.accounts.id.initialize({
          client_id: '540754736098-ahrealgn91kaajougd6nb38u8bphnlg8.apps.googleusercontent.com',
          callback: onSignIn // Your callback function
        });

        // Check if the user is already signed in (using the new library's method):
        const user = google.accounts.id.getAuthInstance().currentUser.get(); // Get the current user
        if (user) {
            onSignIn(user); // Handle the signed-in user
        } else {
            // Create the sign-in button
            const signInButton = document.createElement('div');
            signInButton.id = 'googleSignInButton';
            document.getElementById('signInButtonContainer').appendChild(signInButton);

            google.accounts.id.renderButton(signInButton, {
              theme: "dark", // Customize the theme
              size: "large", // Customize the size
              type: "standard", // Customize the type
              shape: "rectangular", // Customize the shape
              text: "signin_with", // Customize the text
              logo_alignment: "left", // Customize the logo alignment
            });
        }
      } catch (error) {
        console.error("Error initializing Google Sign-In:", error);
      }
    }

    window.onload = loadGoogleSignIn;

    // No need for google.accounts.id.initialize or google.accounts.id.renderButton here
    // as the data-callback and data-client_id in the g_id_onload div handles it.
    </script>

</body>

</html>

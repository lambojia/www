<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <script src="https://cookiechimp.com/widget/jGRt5Z6.js"></script> !-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage</title>
    <link rel="stylesheet" href="style.css">  
    <script defer type="text/javascript" src="config.js"></script>
    <script defer type="text/javascript" src="klaro.js"></script>
    <script src="auth.js" defer></script> 
</head>

<body>

    <div class="container">
        <h1>Google Sign-In</h1>

        <!-- Profile Container (hidden initially) -->
        <div class="profile-container" id="profile-container">
            <img id="profile-picture" src="" alt="Profile Picture">
            <p id="user-name">Hello, User!</p>
            <button class="btn btn-sign-out" id="signout-button" onclick="signOut()">Sign Out</button>
        </div>

        <!-- Google Sign-In Button -->
        <div    id="g_id_onload"
                data-client_id="540754736098-ahrealgn91kaajougd6nb38u8bphnlg8.apps.googleusercontent.com"
                data-login_uri="http://localhost:3000/callback"
                data-callback="onSignIn">
        </div>

        <!-- Sign-In Container (will be hidden once signed in) -->
        <div class="sign-in-container" id="sign-in-container">
            <button class="btn" id="sign-in-button">Sign In with Google</button>
        </div>

    </div>

    <script src="script.js" defer></script> 
    <script src="https://accounts.google.com/gsi/client" async defer></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <!-- <script src="https://cookiechimp.com/widget/jGRt5Z6.js"></script> !-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage</title>
    <link rel="stylesheet" href="style.css">  
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="auth.js"></script> 
</head>

<body>

    <div class="container">

        <h1>Consent Management Portal</h1>

        <!-- Profile Container (hidden initially) -->
        <div class="profile-container" id="profile-container">
          <img id="profile-picture" src="" alt="Profile Picture">
          <p id="user-name">Hello, User!</p>
          <button class="btn btn-sign-out" id="signout-button" onclick="SignOutEvent()">Sign Out</button>
          <button class="btn btn-preferences" id="preferences-button" onclick="showManager()">Manage Preferences</button>
        </div>

        <div id="g_id_onload"
             data-client_id="540754736098-ahrealgn91kaajougd6nb38u8bphnlg8.apps.googleusercontent.com"
             data-callback="SignInEvent"
             data-auto_prompt="false">  </div>
        
        <!-- data-login_uri="http://localhost:3000/callback" -->

        <div id="sign-in-container"
             class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-context="Sign in with Google"
             data-size="large"
             data-logo_alignment="left">
        </div>

    </div>

    <script defer type="text/javascript" src="config.js"></script>
    <script defer type="text/javascript" src="klaro.js"></script>
    <script >
        document.addEventListener('DOMContentLoaded', function() {
console.log("trigger me");
  let klaroLoaded = false;
  let configLoaded = false;
  let kConfig; // Define kConfig here

  // Initialize kConfig (replace with your actual configuration)
  kConfig = {
    // ... your Klaro configuration
  };

  const klaroScript = document.querySelector('script[src*="klaro.js"]');
  const configScript = document.querySelector('script[src*="config.js"]');

  if (!klaroScript) {
    console.error("Klaro script tag not found!");
    return; // Stop execution if script not found
  }

  if (!configScript) {
    console.error("Config script tag not found!");
    return; // Stop execution if script not found
  }

  klaroScript.addEventListener('load', function() {
    klaroLoaded = true;
    checkAndShowKlaro();
  });

  configScript.addEventListener('load', function() {
    configLoaded = true;
    checkAndShowKlaro();
  });

  klaroScript.addEventListener('error', function() {
    console.error("Failed to load klaro.js");
  });

  configScript.addEventListener('error', function() {
    console.error("Failed to load config.js");
  });

  function checkAndShowKlaro() {
    console.log("trigger me");
    if (!klaroLoaded || !configLoaded) {
      return;
    }

    //show preferences button
    document.getElementById('preferences-button').style.display = 'block';

    klaro.getManager(kConfig).watch({
      update: function(obj, name, data) {
        if (name === 'saveConsents') {
          console.log(data);
        }
      }
    });
  }

  function showManager() {
    klaro.show(kConfig, true);
  }

});


    </script>

</body>

</html>
